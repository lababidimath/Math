    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1...",
            authDomain: "lababidi-math.firebaseapp.com",
            databaseURL: "https://lababidimath-74afd-default-rtdb.firebaseio.com/",
            projectId: "lababidi-math",
            storageBucket: "lababidi-math.appspot.com",
            messagingSenderId: "852...",
            appId: "1:852..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const SECRET_SALT = "Prof_Lababidi_Math_2027";
        
        let allTabsData = {}; 
        let navigationStack = []; 
        let currentStudentData = { name: "طالب زائر", isActivated: false, isVip: false, allowedTabs: {} }; 
        let currentActiveTabId = null;
        let pendingTabIdToActivate = null;
        let activeLiveRef = null; 

        let currentLessonsRef = null;
        let currentExercisesRef = null;

        function isTabAllowed(tabId) {
            const tab = allTabsData[tabId];
            if (!tab) return false;
            
            // 🌟 فتح فوري وكامل لجميع التبويبات إذا كانت حالة الحساب VIP
            if (currentStudentData && (currentStudentData.isVip === true || currentStudentData.isVip === 'true')) {
                return true;
            }
            
            const isLocallyUnlocked = localStorage.getItem('unlocked_' + tabId) === 'true';
            const isStudentGlobalActive = (currentStudentData && currentStudentData.isActivated === true);
            
            const unlockedForAll = (tab.isFree === true || tab.isFree === 'true' || tab.unlockedForAll === true || tab.unlockedForAll === 'true' || tab.accessType === 'free');
            const unlockedForSubscribers = isStudentGlobalActive && (tab.forSubscribers === true || tab.forSubscribers === 'true' || tab.accessType === 'locked');
            
            const unlockedForSpecificStudent = currentStudentData && currentStudentData.allowedTabs && 
                (currentStudentData.allowedTabs[tabId] === true || currentStudentData.allowedTabs[tabId] === 'true' || currentStudentData.allowedTabs[tabId] === 1);
            
            return unlockedForAll || unlockedForSubscribers || unlockedForSpecificStudent || isLocallyUnlocked;
        }

        function loadStudentSession() {
            const sessionData = localStorage.getItem('currentStudent');
            if (sessionData) {
                currentStudentData = JSON.parse(sessionData);
            }
            
            const savedKey = localStorage.getItem('student_key');
            const savedPhone = localStorage.getItem('student_phone');

            if (savedKey) {
                setupSingleLiveSync(savedKey);
            } else if (savedPhone) {
                resolveStudentKeyAndSync(savedPhone.replace(/\s+/g, ''));
            } else {
                fetchTabsFromFirebase();
            }
        }

        function handleDeactivation() {
            currentStudentData = { name: "طالب زائر", isActivated: false, isVip: false, allowedTabs: {} };
            localStorage.setItem('currentStudent', JSON.stringify(currentStudentData));
            
            localStorage.removeItem('student_key');
            localStorage.removeItem('student_phone');
            
            if (activeLiveRef) {
                activeLiveRef.off();
                activeLiveRef = null;
            }
            
            if (currentActiveTabId && !isTabAllowed(currentActiveTabId)) {
                currentActiveTabId = null;
                const filesSection = document.getElementById('files-section');
                if (filesSection) filesSection.style.display = 'none';
                const filesList = document.getElementById('files-list');
                if (filesList) filesList.innerHTML = '';
            }
            
            renderTabsHierarchy();
        }

        function resolveStudentKeyAndSync(cleanPhone) {
            const phoneAsNum = Number(cleanPhone);
            
            db.ref('students/' + cleanPhone).once('value', snap => {
                if (snap.exists()) {
                    localStorage.setItem('student_key', cleanPhone);
                    setupSingleLiveSync(cleanPhone);
                    return;
                }
                
                db.ref('students').orderByChild('phone').equalTo(cleanPhone).once('value', searchSnap => {
                    if (searchSnap.exists()) {
                        searchSnap.forEach(childSnap => {
                            localStorage.setItem('student_key', childSnap.key);
                            setupSingleLiveSync(childSnap.key);
                        });
                        return;
                    }
                    
                    if (!isNaN(phoneAsNum)) {
                        db.ref('students').orderByChild('phone').equalTo(phoneAsNum).once('value', numSnap => {
                            if (numSnap.exists()) {
                                numSnap.forEach(childSnap => {
                                    localStorage.setItem('student_key', childSnap.key);
                                    setupSingleLiveSync(childSnap.key);
                                });
                            } else {
                                handleDeactivation();
                            }
                        });
                    } else {
                        handleDeactivation();
                    }
                });
            });
        }

        function setupSingleLiveSync(studentKey) {
            if (!studentKey) return;
            if (activeLiveRef) activeLiveRef.off();
            
            activeLiveRef = db.ref('students/' + studentKey);
            activeLiveRef.on('value', snap => {
                if (snap.exists()) {
                    syncStudentActivation(snap.val());
                } else {
                    handleDeactivation();
                }
            });

            fetchTabsFromFirebase();
        }

        function syncStudentActivation(serverData) {
            if (!serverData) {
                handleDeactivation();
                return;
            }
            if (!currentStudentData) currentStudentData = {};

            // 🌟 استخلاص حالة الـ VIP من السيرفر بمرونة عالية
            const isVip = 
                serverData.isVip === true || serverData.isVip === 'true' ||
                serverData.status === 'vip' || serverData.status === 'VIP' ||
                serverData.subscription === 'vip' || serverData.subscription === 'VIP';

            const isExplicitlyDeactivated = 
                serverData.isActivated === false || serverData.isActivated === 'false' ||
                serverData.active === false || serverData.active === 'false' ||
                serverData.activated === false || serverData.activated === 'false' ||
                serverData.status === 'غير نشط' || serverData.status === 'inactive' || serverData.status === 'منتهي';

            const hasActiveMarker = 
                serverData.isActivated === true || serverData.isActivated === 'true' || 
                serverData.active === true || serverData.active === 'true' || 
                serverData.status === 'active' || serverData.status === 'نشط' ||
                serverData.activated === true || serverData.activated === 'true' ||
                isVip; // حساب الـ VIP يعتبر نشطاً حكماً

            const isActive = hasActiveMarker && !isExplicitlyDeactivated;

            if (isActive || isVip) {
                currentStudentData.isActivated = true;
                currentStudentData.isVip = isVip; 
                currentStudentData.allowedTabs = serverData.allowedTabs || {}; 
                currentStudentData.name = serverData.name || currentStudentData.name;
                currentStudentData.phone = serverData.phone || currentStudentData.phone;
            } else {
                if (serverData.allowedTabs && Object.keys(serverData.allowedTabs).length > 0) {
                    currentStudentData.isActivated = false; 
                    currentStudentData.isVip = false;
                    currentStudentData.allowedTabs = serverData.allowedTabs;
                    currentStudentData.name = serverData.name || currentStudentData.name;
                    currentStudentData.phone = serverData.phone || currentStudentData.phone;
                } else {
                    handleDeactivation();
                    return;
                }
            }
            localStorage.setItem('currentStudent', JSON.stringify(currentStudentData));
            
            if (currentActiveTabId && !isTabAllowed(currentActiveTabId)) {
                currentActiveTabId = null;
                const filesSection = document.getElementById('files-section');
                if (filesSection) filesSection.style.display = 'none';
            }
            
            renderTabsHierarchy();
        }

        function fetchTabsFromFirebase() {
            db.ref('tabs').once('value', snap => {
                allTabsData = snap.val() || {};
                renderTabsHierarchy();
            });
        }

        function hasChildTabs(tabId) {
            return Object.values(allTabsData).some(tab => tab.parentId === tabId);
        }

        function renderTabsHierarchy() {
            const navContainer = document.getElementById('dynamic-tabs');
            const sectionTitle = document.getElementById('library-section-title');
            const sectionDesc = document.getElementById('library-section-description');
            const backArea = document.getElementById('back-action-area');

            if (!navContainer) return;
            navContainer.innerHTML = "";

            if (Object.keys(allTabsData).length === 0) {
                navContainer.innerHTML = '<p style="grid-column: span 2; text-align:center; color:#64748b;">لا توجد أقسام منشورة حالياً.</p>';
                return;
            }

            const currentParentId = navigationStack.length > 0 ? navigationStack[navigationStack.length - 1] : null;

            if (currentParentId === null) {
                sectionTitle.innerText = "اختر القسم المستهدف لتصفح الملفات:";
                sectionDesc.style.display = 'none';
                backArea.innerHTML = ""; 

                Object.keys(allTabsData).forEach(key => {
                    const tab = allTabsData[key];
                    if (!tab.parentId || tab.parentId === 'root') buildTabSquare(key, tab, navContainer);
                });
            } else {
                const parentTab = allTabsData[currentParentId];
                sectionTitle.innerText = `الأقسام الفرعية المتاحة لـ: ${parentTab ? parentTab.name : ''}`;
                sectionDesc.innerText = (parentTab && parentTab.description) ? parentTab.description : "";
                sectionDesc.style.display = (parentTab && parentTab.description) ? 'block' : 'none';
                
                backArea.innerHTML = `<button class="btn-back-platform" onclick="handleNavigationPop()"><i class="fa-solid fa-arrow-right"></i> العودة للقسم السابق</button>`;

                Object.keys(allTabsData).forEach(key => {
                    const tab = allTabsData[key];
                    if (tab.parentId === currentParentId) {
                        buildTabSquare(key, tab, navContainer);
                    }
                });
            }
        }

        function buildTabSquare(key, tab, container) {
            let isAllowed = isTabAllowed(key); 
            const square = document.createElement('div');
            let mediaHtml = tab.imageUrl ? `<img src="${tab.imageUrl}" class="tab-custom-img" onerror="handleMissingTabImage(this, '${tab.type}')">` : `<i class="${tab.type === 'video' ? 'fa-solid fa-circle-play main-icon' : (tab.type === 'exercises' ? 'fa-solid fa-square-root-variable main-icon' : 'fa-solid fa-file-pdf main-icon')}"></i>`;

            if (!isAllowed) {
                square.className = 'tab-square locked';
                square.innerHTML = `<div class="lock-badge"><i class="fa-solid fa-lock"></i></div>${mediaHtml}<span>${tab.name}</span>`;
                square.onclick = () => openActivationModal(key, tab.name);
            } else {
                square.className = `tab-square ${key === currentActiveTabId ? 'active' : ''}`;
                square.innerHTML = `${mediaHtml}<span>${tab.name}</span>`;
                square.onclick = () => {
                    if (hasChildTabs(key)) {
                        const filesSection = document.getElementById('files-section');
                        if (filesSection) filesSection.style.display = 'none';
                        currentActiveTabId = null;

                        navigationStack.push(key);
                        renderTabsHierarchy();
                    } else {
                        document.querySelectorAll('.tab-square').forEach(s => s.classList.remove('active'));
                        square.classList.add('active');
                        currentActiveTabId = key;
                        loadLessonsForTab(key, tab.name);
                    }
                };
            }
            container.appendChild(square);
        }

        function openActivationModal(tabId, tabName) {
            pendingTabIdToActivate = tabId;
            document.getElementById('modal-tab-title').innerText = `تفعيل قسم: ${tabName}`;
            
            let savedPhone = (currentStudentData && currentStudentData.phone) ? currentStudentData.phone : (localStorage.getItem('student_phone') || "");
            document.getElementById('modal-input-phone').value = savedPhone.trim();
            document.getElementById('modal-input-code').value = "";
            
            document.getElementById('activation-modal').classList.add('open');
            if(savedPhone.trim() !== "") {
                document.getElementById('modal-input-code').focus();
            } else {
                document.getElementById('modal-input-phone').focus();
            }
        }

        function closeActivationModal() {
            document.getElementById('activation-modal').classList.remove('open');
            pendingTabIdToActivate = null;
        }

        function checkPhoneActivationOnTheFly(rawPhone) {
            const cleanPhone = rawPhone.replace(/\s+/g, '');
            if (cleanPhone.length < 9) return;

            const phoneAsNum = Number(cleanPhone);
            const targetTabId = pendingTabIdToActivate;

            const processInstantUnlock = (serverData, actualKey) => {
                // 🌟 فحص حالة الـ VIP عند الفحص السريع بالهاتف
                const isVip = 
                    serverData.isVip === true || serverData.isVip === 'true' ||
                    serverData.status === 'vip' || serverData.status === 'VIP' ||
                    serverData.subscription === 'vip' || serverData.subscription === 'VIP';

                const isExplicitlyDeactivated = 
                    serverData.isActivated === false || serverData.isActivated === 'false' ||
                    serverData.active === false || serverData.active === 'false' ||
                    serverData.status === 'غير نشط' || serverData.status === 'inactive' || serverData.status === 'منتهي';

                const hasActiveMarker = 
                    serverData.isActivated === true || serverData.isActivated === 'true' || 
                    serverData.active === true || serverData.active === 'true' || 
                    serverData.status === 'active' || serverData.status === 'نشط' ||
                    isVip;

                const isActive = hasActiveMarker && !isExplicitlyDeactivated;
                const hasSpecificTabAccess = serverData.allowedTabs && 
                    (serverData.allowedTabs[targetTabId] === true || serverData.allowedTabs[targetTabId] === 'true' || serverData.allowedTabs[targetTabId] === 1);

                if (isActive || hasSpecificTabAccess || isVip) {
                    localStorage.setItem('student_phone', cleanPhone);
                    localStorage.setItem('student_key', actualKey); 
                    
                    currentStudentData = {
                        isActivated: isActive,
                        isVip: isVip,
                        allowedTabs: serverData.allowedTabs || {},
                        name: serverData.name || "طالب متميز",
                        phone: cleanPhone
                    };
                    localStorage.setItem('currentStudent', JSON.stringify(currentStudentData));
                    
                    closeActivationModal();
                    renderTabsHierarchy();
                    
                    if (targetTabId && allTabsData[targetTabId]) {
                        currentActiveTabId = targetTabId;
                        loadLessonsForTab(targetTabId, allTabsData[targetTabId].name);
                    }

                    setupSingleLiveSync(actualKey);
                    setTimeout(() => {
                        alert(`🎯 تم التعرف على تفعيلك التلقائي بنجاح! مرحباً بك يا ${serverData.name || 'طالبنا المتميز'}.`);
                    }, 100);
                }
            };

            db.ref('students/' + cleanPhone).once('value', snap => { 
                if(snap.exists()) {
                    processInstantUnlock(snap.val(), cleanPhone); 
                } else {
                    db.ref('students').orderByChild('phone').equalTo(cleanPhone).once('value', snap2 => { 
                        if(snap2.exists()) {
                            snap2.forEach(c => processInstantUnlock(c.val(), c.key)); 
                        } else if(!isNaN(phoneAsNum)) {
                            db.ref('students').orderByChild('phone').equalTo(phoneAsNum).once('value', snap3 => { 
                                if(snap3.exists()) snap3.forEach(c => processInstantUnlock(c.val(), c.key)); 
                            });
                        }
                    });
                }
            });
        }

        document.getElementById('modal-input-phone').addEventListener('input', function(e) {
            if(e.target.value.trim().length >= 9) {
                checkPhoneActivationOnTheFly(e.target.value);
            }
        });

        document.getElementById('modal-btn-confirm').addEventListener('click', () => {
            if (!pendingTabIdToActivate) return;
            
            const phoneField = document.getElementById('modal-input-phone');
            const codeField = document.getElementById('modal-input-code');
            const rawPhone = phoneField.value.trim();
            const typedKey = codeField.value.trim().toUpperCase();
            
            const tabId = pendingTabIdToActivate;
            const tabName = allTabsData[tabId] ? allTabsData[tabId].name : "";

            if (rawPhone === "") {
                alert("الرجاء إدخال رقم الهاتف أولاً!");
                return;
            }

            const cleanPhone = rawPhone.replace(/\s+/g, '');
            localStorage.setItem('student_phone', cleanPhone);

            if(typedKey !== "") {
                let fullString = cleanPhone + tabId + SECRET_SALT;
                let hash = 0;
                for (let i = 0; i < fullString.length; i++) {
                    hash = (hash << 5) - hash + fullString.charCodeAt(i);
                    hash |= 0;
                }
                const expectedKey = "LABA-" + Math.abs(hash).toString(16).toUpperCase();

                if (typedKey === expectedKey) {
                    localStorage.setItem('unlocked_' + tabId, 'true');
                    closeActivationModal();
                    
                    renderTabsHierarchy();
                    currentActiveTabId = tabId;
                    loadLessonsForTab(tabId, tabName);
                    
                    setTimeout(() => {
                        alert(`🎉 تم تفعيل قسم [ ${tabName} ] بنجاح بواسطة الكود.`);
                    }, 80);
                } else {
                    alert("❌ كود التفعيل اليدوي المدخل غير صحيح!");
                }
            } else {
                checkPhoneActivationOnTheFly(cleanPhone);
                setTimeout(() => {
                    if (document.getElementById('activation-modal').classList.contains('open')) {
                         alert("❌ لم يتم العثور على تفعيل تلقائي لهذا الرقم على السيرفر لهذا القسم بالتحديد!");
                    }
                }, 1000);
            }
        });

        function handleNavigationPop() { 
            navigationStack.pop(); 
            currentActiveTabId = null; 
            const filesSection = document.getElementById('files-section');
            if (filesSection) filesSection.style.display = 'none';
            renderTabsHierarchy(); 
        }
        
        function handleMissingTabImage(imgElement, type) { 
            const i = document.createElement('i'); 
            i.className = type === 'video' ? 'fa-solid fa-circle-play main-icon' : (type === 'exercises' ? 'fa-solid fa-square-root-variable main-icon' : 'fa-solid fa-file-pdf main-icon'); 
            imgElement.replaceWith(i); 
        }

        /* ──────────────── 📐 نظام الجلب والتصيير المتجاوب والـ LaTeX ──────────────── */
        function loadLessonsForTab(tabId, tabName) {
            const filesSection = document.getElementById('files-section');
            const selectedTitle = document.getElementById('selected-tab-title');
            const filesList = document.getElementById('files-list');
            
            if (!filesSection || !selectedTitle || !filesList) return;
            
            selectedTitle.innerText = `📚 محتويات: ${tabName}`;
            filesList.innerHTML = '<p style="text-align:center; color:#94a3b8;">جاري مراجعة الملفات والمسائل المتاحة للقسم...</p>';
            filesSection.style.display = 'block';

            if (currentLessonsRef) currentLessonsRef.off();
            if (currentExercisesRef) currentExercisesRef.off();

            let localLessons = {};
            let localExercises = {};

            currentLessonsRef = db.ref('lessons').orderByChild('tabId').equalTo(tabId);
            currentExercisesRef = db.ref('math_exercises').orderByChild('tabId').equalTo(tabId);

            const mergeAndRenderAll = () => {
                filesList.innerHTML = "";

                if (Object.keys(localLessons).length === 0 && Object.keys(localExercises).length === 0) {
                    filesList.innerHTML = '<p style="text-align:center; color:#64748b; padding:10px;">لا توجد ملفات أو نوط أو مسائل مضافة في هذا القسم حالياً.</p>';
                    return;
                }

                // 1. عرض النوط والفيديوهات
                Object.keys(localLessons).forEach(key => {
                    const lesson = localLessons[key];
                    const pdfItem = document.createElement('div');
                    pdfItem.className = 'pdf-item';
                    
                    let secureUrl = lesson.url.includes('drive.google.com') ? lesson.url.replace('/view?usp=sharing', '/preview').replace('/view', '/preview') : lesson.url;
                    let iconHtml = `<i class="fa-solid fa-file-pdf" style="color: #e53e3e; margin-left: 8px;"></i>`;
                    let btnText = `تصفح النوطة آمن`;
                    
                    if (lesson.type === 'video') {
                        iconHtml = `<i class="fa-solid fa-circle-play" style="color: #06b6d4; margin-left: 8px;"></i>`;
                        btnText = `مشاهدة الشرح التفاعلي`;
                    }

                    pdfItem.innerHTML = `<span>${iconHtml} ${lesson.title}</span><a href="${secureUrl}" target="_blank" class="btn-preview">${btnText}</a>`;
                    filesList.appendChild(pdfItem);
                });

                // 2. عرض المسائل الرياضية المكتوبة بصيغة LaTeX وترتيبها بنظام الأكورديون
                const sortedExercises = Object.keys(localExercises).map(key => ({ id: key, ...localExercises[key] }))
                                              .sort((a, b) => (a.order || 0) - (b.order || 0));

                sortedExercises.forEach(ex => {
                    const exerciseCard = document.createElement('div');
                    exerciseCard.className = 'latex-exercise-card';
                    
                    exerciseCard.innerHTML = `
                        <div class="exercise-header-clickable" onclick="toggleExerciseAccordion('${ex.id}')">
                            <span style="font-weight: bold; color: var(--primary-color);">
                                <i class="fa-solid fa-calculator" style="color: var(--accent-color); margin-left: 6px;"></i> ${ex.title}
                            </span>
                            <i class="fa-solid fa-chevron-down" style="color: #9ca3af; transition: transform 0.2s;" id="chevron-${ex.id}"></i>
                        </div>
                        
                        <div class="exercise-toggle-content" id="exercise-content-${ex.id}">
                            <div class="exercise-problem-box">
                                ${ex.question}
                            </div>
                            <button class="btn-preview" style="align-self: flex-start; background-color: var(--primary-color); border: none; cursor: pointer;" onclick="toggleSolutionDisplay('${ex.id}')">
                                <i class="fa-solid fa-eye" id="icon-${ex.id}"></i> <span id="btn-text-${ex.id}" style="color: white;">عرض الحل النموذجي</span>
                            </button>
                            <div class="exercise-solution-box" id="solution-container-${ex.id}">
                                <strong style="color: var(--success-color); display: block; margin-bottom: 6px;"><i class="fa-solid fa-square-check"></i> خطوات الحل المعتمدة:</strong>
                                <div style="color: var(--text-color);">${ex.solution}</div>
                            </div>
                        </div>
                    `;
                    filesList.appendChild(exerciseCard);
                });

                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise([filesList]).catch(err => console.log(err));
                }
            };

            currentLessonsRef.on('value', snap => {
                localLessons = snap.val() || {};
                mergeAndRenderAll();
            });

            currentExercisesRef.on('value', snap => {
                localExercises = snap.val() || {};
                mergeAndRenderAll();
            });
        }

        function toggleExerciseAccordion(key) {
            const targetContentBox = document.getElementById(`exercise-content-${key}`);
            const targetChevron = document.getElementById(`chevron-${key}`);
            
            if (!targetContentBox) return;

            if (targetContentBox.style.display === 'none' || targetContentBox.style.display === '') {
                document.querySelectorAll('.exercise-toggle-content').forEach(box => {
                    if (box.id !== `exercise-content-${key}`) {
                        box.style.display = 'none';
                        const otherKey = box.id.replace('exercise-content-', '');
                        const otherChevron = document.getElementById(`chevron-${otherKey}`);
                        if (otherChevron) otherChevron.style.transform = 'rotate(0deg)';
                        
                        const solBox = document.getElementById(`solution-container-${otherKey}`);
                        const btnText = document.getElementById(`btn-text-${otherKey}`);
                        const eyeIcon = document.getElementById(`icon-${otherKey}`);
                        if (solBox) solBox.style.display = 'none';
                        if (btnText) btnText.innerText = 'عرض الحل النموذجي';
                        if (eyeIcon) eyeIcon.className = 'fa-solid fa-eye';
                    }
                });

                targetContentBox.style.display = 'block';
                if (targetChevron) targetChevron.style.transform = 'rotate(180deg)';
            } else {
                targetContentBox.style.display = 'none';
                if (targetChevron) targetChevron.style.transform = 'rotate(0deg)';
                
                const solBox = document.getElementById(`solution-container-${key}`);
                const btnText = document.getElementById(`btn-text-${key}`);
                const eyeIcon = document.getElementById(`icon-${key}`);
                if (solBox) solBox.style.display = 'none';
                if (btnText) btnText.innerText = 'عرض الحل النموذجي';
                if (eyeIcon) eyeIcon.className = 'fa-solid fa-eye';
            }
        }

        function toggleSolutionDisplay(key) {
            const container = document.getElementById(`solution-container-${key}`);
            const text = document.getElementById(`btn-text-${key}`);
            const icon = document.getElementById(`icon-${key}`);

            if (!container) return;

            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                text.innerText = 'إخفاء الحل';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                container.style.display = 'none';
                text.innerText = 'عرض الحل النموذجي';
                icon.className = 'fa-solid fa-eye';
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem('platform-theme') === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            loadStudentSession();
        });
    </script>
</body>
</html>
